name: Build Windows Installer

# Builds FrameworkUpdateCheckerSetup.exe on a Windows runner so you don't need
# Python or Inno Setup installed locally. Runs on every push, on demand, and
# attaches the installer to any tag you push as a GitHub Release.

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller

      - name: Build app with PyInstaller
        run: >
          pyinstaller --noconfirm --clean --onedir --windowed
          --name FrameworkUpdateChecker --icon icon.ico
          --add-data "icon.ico;."
          --collect-submodules pystray
          --collect-all winotify
          app.py

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" installer.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FrameworkUpdateCheckerSetup
          path: dist_installer/FrameworkUpdateCheckerSetup.exe

      - name: Attach to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist_installer/FrameworkUpdateCheckerSetup.exe
